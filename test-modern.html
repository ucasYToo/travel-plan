<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<script src="https://unpkg.com/modern-screenshot@4.6.8/dist/index.global.js"></script>
</head>
<body>
<div id="target" style="width:400px;height:300px;background:#f0f0f0;position:relative;">
  <div style="position:absolute;left:0;right:0;bottom:0;background:rgba(0,0,0,0.5);color:#fff;padding:20px;">
    Overlay Test Day 1
  </div>
</div>
<script>
setTimeout(async function() {
  try {
    const el = document.getElementById('target')
    window.__libOk = typeof modernScreenshot !== 'undefined'
    const url = await modernScreenshot.domToPng(el, { width: 400, height: 300 })
    window.__result = url
  } catch (e) {
    window.__error = e.message
  }
}, 500)
</script>
</body>
</html>
